name: voodoo-bench CI

on:
  push:
    branches: [main]
    paths:
      - "voodoo-bench/**"
      - ".github/workflows/voodoo-bench-ci.yml"
  pull_request:
    paths:
      - "voodoo-bench/**"
      - ".github/workflows/voodoo-bench-ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: voodoo-bench

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: voodoo-bench/pyproject.toml

      - name: Install voodoo-bench
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Smoke-test CLI
        run: |
          voodoo-bench --version
          voodoo-bench --help

      - name: Run pytest
        run: pytest -v --tb=short

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build distributions
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          python -m venv /tmp/wheel-check
          /tmp/wheel-check/bin/pip install dist/*.whl
          /tmp/wheel-check/bin/voodoo-bench --version

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: voodoo-bench-dist
          path: voodoo-bench/dist/
          if-no-files-found: error
