name: voodoo-bench Publish

# Publishes voodoo-bench to PyPI when a tag matching `voodoo-bench-v*` is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token in secrets.
# Configure once at https://pypi.org/manage/project/voodoo-bench/settings/publishing/
# with: workflow = voodoo-bench-publish.yml, environment = pypi.

on:
  push:
    tags:
      - "voodoo-bench-v*"
  workflow_dispatch:

defaults:
  run:
    working-directory: voodoo-bench

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: voodoo-bench-dist
          path: voodoo-bench/dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/voodoo-bench
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: voodoo-bench-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
